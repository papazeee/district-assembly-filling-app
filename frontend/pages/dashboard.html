<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — Ada East Digital Filing System</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

<div id="sidebar-mount"></div>

<!-- ── Main ── -->
<div class="main">

  <header class="header">
    <div class="header-title">Dashboard</div>
    <div class="header-date" id="headerDate"></div>
    <button class="notif-btn" id="notifBtn" title="Notifications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="notif-dot" id="notifDot"></span>
    </button>
  </header>

  <div class="content">

    <!-- Welcome -->
    <div class="welcome-banner">
      <div class="welcome-text">
        <h2 id="welcomeMsg">Good morning</h2>
        <p>Today is <span id="todayDate">—</span> &mdash; Ada East District Assembly Filing System</p>
      </div>
      <div class="welcome-actions">
        <a href="incoming.html" class="btn btn-gold">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Log Incoming
        </a>
        <a href="outgoing.html" class="btn btn-outline-white">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Log Outgoing
        </a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid">
      <div class="stat-card green">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </div>
        <div class="stat-value" id="statIncoming">—</div>
        <div class="stat-label">Total Incoming</div>
        <div class="stat-trend" id="statIncomingYear"></div>
      </div>

      <div class="stat-card gold">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
        </div>
        <div class="stat-value" id="statOutgoing">—</div>
        <div class="stat-label">Total Outgoing</div>
        <div class="stat-trend" id="statOutgoingYear"></div>
      </div>

      <div class="stat-card blue">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        </div>
        <div class="stat-value" id="statPending">—</div>
        <div class="stat-label">Pending Action</div>
        <div class="stat-trend">Awaiting next step</div>
      </div>

      <div class="stat-card red">
        <div class="stat-icon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
        </div>
        <div class="stat-value" id="statWithDCE">—</div>
        <div class="stat-label">With DCE</div>
        <div class="stat-trend">Awaiting DCE review</div>
      </div>
    </div>

    <!-- Bottom -->
    <div class="bottom-grid">

      <div class="card">
        <div class="card-header">
          <span class="card-title">Recent Letters</span>
          <a href="incoming.html" class="card-action">View all →</a>
        </div>
        <div id="recentLetters">
          <table class="letter-table">
            <thead>
              <tr>
                <th>Serial</th>
                <th>Subject</th>
                <th>Type</th>
                <th>Status</th>
                <th>Date</th>
              </tr>
            </thead>
            <tbody id="recentLettersBody">
              <tr><td colspan="5"><div class="skeleton skel-row margin1"></div><div class="skeleton skel-row margin0 width-70"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <span class="card-title">Workflow Status</span>
        </div>
        <div class="workflow-list" id="workflowList">
          <div class="empty-state">
            <div class="skeleton skel-row margin0"></div>
            <div class="skeleton skel-row margin0 width-80"></div>
            <div class="skeleton skel-row margin0 width-60"></div>
          </div>
        </div>
      </div>

    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/dashboard.js"></script>
</body>
</html>
