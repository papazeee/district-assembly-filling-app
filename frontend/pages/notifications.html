<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notifications — Ada East Digital Filing System</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

<div id="sidebar-mount"></div>

<div class="main">
  <header class="header">
    <div class="header-title">Notifications</div>
    <div class="header-date" id="headerDate"></div>
    <button class="notif-btn" type="button" title="Notifications" aria-label="Notifications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="notif-dot" id="notifDot"></span>
    </button>
  </header>

  <div class="content">
    <div class="page-header">
      <div class="page-header-left">
        <h2>Notifications</h2>
        <p>Letters forwarded to you and system alerts</p>
      </div>
      <button class="btn btn-outline btn-sm" id="markAllReadBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Mark all as read
      </button>
    </div>

    <div class="card" id="notifCard">
      <div id="notifList" style="padding: .5rem 0;">
        <div style="padding: 2rem; text-align: center; color: var(--muted);">Loading…</div>
      </div>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/notifications.js"></script>
</body>
</html>
