<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>User Management — Ada East Digital Filing System</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
  
</head>
<body>

<div id="sidebar-mount"></div>

<div class="main">
  <header class="header">
    <div class="header-title">User Management</div>
    <div class="header-date" id="headerDate"></div>
    <button class="notif-btn" type="button" title="Notifications" aria-label="Notifications"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg><span class="notif-dot" id="notifDot"></span></button>
  </header>

  <div class="content">
    <div class="page-header">
      <div class="page-header-left">
        <h2>User Management</h2>
        <p>Create and manage staff accounts and roles</p>
      </div>
      <button class="btn btn-primary" id="openCreateBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Add User
      </button>
    </div>

    <div class="filters-bar">
      <input type="search" id="searchInput" placeholder="Search by name or email…" />
      <button class="btn btn-outline btn-sm" id="refreshBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
        Refresh
      </button>
    </div>

    <div class="card">
      <div class="table-wrap">
        <table class="data-table">
          <thead>
            <tr><th>Name</th><th>Email</th><th>Role</th><th>Department</th><th>Status</th><th>Actions</th></tr>
          </thead>
          <tbody id="usersBody">
            <tr><td colspan="6" class="table-loading-cell">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- ── Create/Edit User Modal ── -->
<div class="modal-overlay" id="userModal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="userModalTitle">Add User</span>
      <button class="modal-close" type="button" title="Close" aria-label="Close" onclick="closeModal('userModal')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="alert alert-error hidden" id="userAlert">
        <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 0a10 10 0 100 20A10 10 0 0010 0zm1 15H9v-2h2v2zm0-4H9V5h2v6z"/></svg>
        <span></span>
      </div>
      <form id="userForm" novalidate>
        <input type="hidden" id="editUserId" />
        <div class="form-group">
          <label>Full Name <span class="required">*</span></label>
          <input type="text" id="f_full_name" placeholder="e.g. Uncle Jojo Ochir" required />
        </div>
        <div class="form-group">
          <label>Email Address <span class="required">*</span></label>
          <input type="email" id="f_email" placeholder="user@gmail.com" required />
        </div>
        <div class="form-group" id="passwordGroup">
          <label>Password <span class="required">*</span></label>
          <input type="password" id="f_password" placeholder="Min. 8 characters" />
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Role <span class="required">*</span></label>
            <select id="f_role" required aria-label="Role" title="Role">
              <option value=""> Select role </option>
              <option value="ADMIN">Admin</option>
              <option value="RECORDS">Records Officer</option>
              <option value="DIRECTOR">Director</option>
              <option value="DCE">DCE</option>
              <option value="DEPARTMENT_HEAD">Department Head</option>
            </select>
          </div>
          <div class="form-group">
            <label>Department</label>
            <select id="f_department_id" aria-label="Department" title="Department">
              <option value=""> None </option>
            </select>
          </div>
        </div>
      </form>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal('userModal')">Cancel</button>
      <button class="btn btn-primary" id="userSubmitBtn">
        <span class="btn-text">Save User</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/users.js"></script>
</body>
</html>
