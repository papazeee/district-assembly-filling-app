<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letter Detail — Ada East Digital Filing System</title>
  <link rel="stylesheet" href="../css/variables.css" />
  <link rel="stylesheet" href="../css/layout.css" />
  <link rel="stylesheet" href="../css/components.css" />
</head>
<body>

<div id="sidebar-mount"></div>

<div class="main">
  <header class="header">
    <div class="header-title" id="headerTitle">Letter Detail</div>
    <div class="header-date" id="headerDate"></div>
    <button class="notif-btn" type="button" title="Notifications" aria-label="Notifications">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
      <span class="notif-dot" id="notifDot"></span>
    </button>
  </header>

  <div class="content">

    <!-- Back link -->
    <div style="margin-bottom: 1.2rem;">
      <a href="javascript:history.back()" class="btn btn-outline btn-sm">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        Back
      </a>
    </div>

    <!-- Loading / error state -->
    <div id="letterError" class="alert alert-error hidden">
      <svg viewBox="0 0 20 20" fill="currentColor"><path d="M10 0a10 10 0 100 20A10 10 0 0010 0zm1 15H9v-2h2v2zm0-4H9V5h2v6z"/></svg>
      <span id="letterErrorMsg">Could not load letter.</span>
    </div>

    <div id="letterDetail" hidden>

      <!-- Header card -->
      <div class="card" style="margin-bottom: 1.5rem;">
        <div class="card-header" style="flex-wrap: wrap; gap: .8rem;">
          <div>
            <div style="font-family: monospace; font-size: .85rem; color: var(--muted); margin-bottom: .3rem;" id="detailSerial"></div>
            <div style="font-family: var(--font-display); font-size: 1.2rem; color: var(--green-dark);" id="detailSubject"></div>
          </div>
          <div id="detailStatusBadge"></div>
        </div>
        <div class="card-body">
          <div class="detail-grid">
            <div class="detail-item"><div class="detail-label">Reference No.</div><div class="detail-value" id="detailRef"></div></div>
            <div class="detail-item"><div class="detail-label">Date Received</div><div class="detail-value" id="detailDate"></div></div>
            <div class="detail-item"><div class="detail-label">Sender</div><div class="detail-value" id="detailSender"></div></div>
            <div class="detail-item"><div class="detail-label">Organisation</div><div class="detail-value" id="detailOrg"></div></div>
            <div class="detail-item"><div class="detail-label">Department</div><div class="detail-value" id="detailDept"></div></div>
            <div class="detail-item"><div class="detail-label">Type</div><div class="detail-value" id="detailType"></div></div>
            <div class="detail-item" id="detailAttachWrap" style="grid-column: span 2; display: none;">
              <div class="detail-label">Attachment</div>
              <div class="detail-value"><a id="detailAttach" href="#" target="_blank" rel="noopener noreferrer" style="color: var(--green); text-decoration: underline;"></a></div>
            </div>
            <div class="detail-item" id="detailNotesWrap" style="grid-column: span 2; display: none;">
              <div class="detail-label">Notes</div>
              <div class="detail-value" id="detailNotes"></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Audit trail -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">Audit Trail</span>
        </div>
        <div class="card-body">
          <div class="timeline" id="detailTimeline"></div>
        </div>
      </div>

    </div>

    <!-- Skeleton while loading -->
    <div id="letterSkeleton">
      <div class="card" style="margin-bottom:1.5rem;">
        <div class="card-body">
          <div class="skeleton skel-row" style="width:140px; margin-bottom:.8rem;"></div>
          <div class="skeleton skel-row" style="width:280px; margin-bottom:1.5rem;"></div>
          <div class="skeleton skel-row" style="width:60%;"></div>
        </div>
      </div>
      <div class="card">
        <div class="card-body">
          <div class="skeleton skel-row" style="margin-bottom:.8rem;"></div>
          <div class="skeleton skel-row width-80"></div>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="../js/app.js"></script>
<script src="../js/sidebar.js"></script>
<script src="../js/letter-detail.js"></script>
</body>
</html>
